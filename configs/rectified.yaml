# WaveDiT — Rectified Flow variant.
# Launch with:  bash train.sh configs/rectified.yaml
run_name: WaveDiT_Rectified
seed: 42
device: cuda
precision: bf16

data:
  metadata_csv: ./data/dataset.csv
  data_folder: null
  conditions:
    age: numeric
  image_size: [224, 224, 224]
  val_split: 0.2
  num_workers: 8
  filepath_col: FilePath
  subject_id_col: SubjectID
  filter_col: Condition
  filter_value: CN

model:
  patch_size: [8, 8]
  cond_embed_dim: 256
  slice_embed_dim: 256
  flow: rectified
  morpheus_scale: 1.0
  levels:
    - {depth: 2, width: 1024, d_ff: 4096, dropout: 0.0, self_attn: {type: neighborhood, d_head: 64, kernel_size: 7}}
    - {depth: 2, width: 1024, d_ff: 4096, dropout: 0.1, self_attn: {type: spatio-temporal, d_head: 64}}
  mapping: {depth: 2, width: 768, d_ff: 2304, dropout: 0.0}

train:
  epochs: 200
  batch_size: 8
  lr: 1.0e-4
  weight_decay: 1.0e-5
  grad_clip_norm: 1.0
  early_stop_patience: 200
  num_flow_steps_sampling: 10
  resume_from: null

sampling:
  sampler: heun
  cfg_rescale: 0.7

logging:
  wandb: true
  wandb_project: WaveDiT
  wandb_entity: null
  checkpoint_dir: ./checkpoints

post_train_generation:
  enabled: true
  num_samples: 2
  conditions: ["age=35.0", "age=75.0"]
  save_size: [182, 218, 182]
  cfg_scale: 1.0
